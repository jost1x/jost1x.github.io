repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: biome-format
        name: biome format
        entry: npx biome format --write
        language: system
        types: [text]
        files: \.(js|ts|jsx|tsx|json|astro|mjs|cjs)$
        stages: [pre-commit]

      - id: biome-check
        name: biome check
        entry: npx biome check --write --no-errors-on-unmatched
        language: system
        types: [text]
        files: \.(js|ts|jsx|tsx|json|astro|mjs|cjs)$
        stages: [pre-commit]

      - id: biome-lint
        name: biome lint
        entry: npx biome lint --no-errors-on-unmatched
        language: system
        types: [text]
        files: \.(js|ts|jsx|tsx|json|astro|mjs|cjs)$
        stages: [pre-push]
